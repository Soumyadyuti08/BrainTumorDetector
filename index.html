<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainScan AI | MRI Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="nav card">
      <div class="brand">
        <span class="logo">Brain Tumor Detector by Soumyadyuti Roy</span>
      </div>
      <div class="status">
        <span id="pip"></span>
        <span id="statusText">Loading model…</span>
      </div>
    </header>

    <section class="hero">
      <h1>MRI Brain Tumor Analysis</h1>
      <p>Upload a brain MRI scan to detect glioma, meningioma, pituitary tumor, or a healthy brain.</p>
    </section>

    <main class="grid">
      <section id="drop" class="card drop">
        <div class="drop-inner">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p>Upload MRI Image</p>
          <span>Drag and drop or click to browse</span>
          <input type="file" id="fileInput" accept="image/*" hidden />
        </div>
      </section>

      <section id="panel" class="card panel">
        <div class="img-wrap">
          <img id="thumb" alt="MRI scan preview" />
        </div>
        <div class="info">
          <div id="scanName" class="name"></div>
          <div id="scanMeta" class="meta"></div>
        </div>
        <div class="actions">
          <button id="runBtn" disabled>Analyze Scan</button>
          <button id="clearBtn" class="ghost">Reset</button>
        </div>
      </section>

      <section id="results" class="card results">
        <div class="results-head">
          <div id="tag" class="tag"></div>
          <div id="verdictLabel" class="verdict"></div>
        </div>
        <div id="barList" class="bars"></div>
      </section>
    </main>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      <span>Running inference…</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
